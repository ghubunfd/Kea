name: Update Neusiedler See water temperature

on:
  schedule:
    # 05:17 UTC daily (07:17 in Vienna summer time).
    # wassertemperatur.org updates its daily value in the morning.
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: water-temp
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch water temperature
        run: python3 .github/scripts/fetch_water_temp.py

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain water.json)" ]; then
            echo "water.json unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "kea-wetter-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add water.json
          git commit -m "Update Neusiedler See water temperature ($(date -u +%Y-%m-%d))"
          git push
